# Daglig SEO/GEO-refresh. Sajten är helstatisk — enda sättet att uppdatera
# inbäddad JSON-LD/llms.txt är rebuild + redeploy. Innehåll (jobb/events/deals)
# ändras oberoende av kod, och deadlines passerar, så en daglig cron håller
# datan färsk. Deployar ENDAST när den publika datan faktiskt ändrats
# (hash-jämförelse mot live /seo-hash.txt) — ingen falsk sitemap-lastmod.
#
# Kräver samma secrets som deploy.yml (NEXT_PUBLIC_* + FIREBASE_SERVICE_ACCOUNT).

name: SEO Refresh

on:
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC ≈ 05–06 svensk tid
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_CLOUDINARY_DELETE_URL: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_DELETE_URL }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/.firebase-sa.json

    steps:
      - uses: actions/checkout@v7
        with:
          ref: master

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Installera beroenden
        run: npm ci

      - name: Generera SEO-data + kontrollera ändring
        id: seo
        run: node scripts/generate-seo-data.mjs --check-live

      - name: Skriv service account-nyckel
        if: steps.seo.outputs.changed == 'true'
        run: |
          cat > "$GOOGLE_APPLICATION_CREDENTIALS" <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF

      - name: Stämpla sitemap lastmod till deploy-datum
        if: steps.seo.outputs.changed == 'true'
        run: node scripts/stamp-sitemap.mjs

      - name: Aktivera web frameworks-stöd
        if: steps.seo.outputs.changed == 'true'
        run: npx --yes firebase-tools experiments:enable webframeworks

      - name: Deploya till Firebase Hosting
        if: steps.seo.outputs.changed == 'true'
        run: npx --yes firebase-tools deploy --only hosting --project tkl-nexus --force

      - name: Rensa service account-nyckel
        if: always()
        run: rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
