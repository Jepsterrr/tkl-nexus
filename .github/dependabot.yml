# Automatisk bevakning av beroenden — säkerhetspatchar upptäcks utan manuellt
# arbete. Minor/patch grupperas till en PR per vecka för att minska bruset;
# majors får egna PR:ar. E2E-workflowen agerar kvalitetsgrind på varje PR.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Stockholm
    open-pull-requests-limit: 5
    groups:
      minor-och-patch:
        update-types:
          - minor
          - patch
    ignore:
      # @types/node ska matcha Node-versionen i CI/hosting (22) — inte senaste
      # major. Bumpas manuellt när runtime-versionen höjs.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # eslint-config-next (16.2.10) bundlar eslint-plugin-react som kraschar
      # under ESLint 10 (getFilename borttaget). Ta majorn när Next stödjer den.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Stockholm
    # En samlad PR för alla actions-bumpar istället för en per action
    groups:
      actions:
        patterns: ["*"]
