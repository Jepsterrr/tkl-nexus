name = "tkl-cloudinary-delete"
main = "worker.js"
compatibility_date = "2026-06-01"
workers_dev = true
# Preview-URL:er av — CSP tillåter bara den exakta produktions-URL:en
preview_urls = false

[vars]
FIREBASE_PROJECT_ID = "tkl-nexus"
# Produktion: inga localhost-origins. Lokal utveckling mot Workern testas via
# `wrangler dev` eller [env.dev] nedan — lägg ALDRIG tillbaka localhost här.
ALLOWED_ORIGINS = "https://tklnexus.se,https://www.tklnexus.se"
# Begränsar radering till upload-presetens mapp ("Deals TKL NEXUS" har
# asset_folder deals/logos med prefix på). Utan denna kan en kapad
# admin-session radera vilken bild som helst i hela Cloudinary-kontot.
PUBLIC_ID_PREFIX = "deals/logos/"

# Lokal utveckling: `wrangler deploy --env dev` (eller `wrangler dev --env dev`)
# ger en separat worker som tillåter localhost — produktionen förblir strikt.
[env.dev]
[env.dev.vars]
FIREBASE_PROJECT_ID = "tkl-nexus"
ALLOWED_ORIGINS = "http://localhost:3000"
PUBLIC_ID_PREFIX = "deals/logos/"

# Rate limiting per klient-IP (Workers-binding — WAF-regler går inte att
# använda eftersom tklnexus.se-zonen inte ligger hos Cloudflare).
# 20 raderingar/minut räcker gott för legitim admin-användning.
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 20
  period = 60

# Secrets — sätts EN gång med:
#   wrangler secret put CLOUDINARY_CLOUD_NAME
#   wrangler secret put CLOUDINARY_API_KEY
#   wrangler secret put CLOUDINARY_API_SECRET
